version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chatbot_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: chatbot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    ports:
      - "6379:6379"

  api:
    build: ./backend
    container_name: chatbot_api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://admin:admin_password@db:5432/chatbot
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your_super_secret_production_key
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    container_name: chatbot_worker
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://admin:admin_password@db:5432/chatbot
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your_super_secret_production_key
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
    command: celery -A workers.celery_app worker --loglevel=info

  ollama:
    image: ollama/ollama:latest
    container_name: chatbot_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    # Placeholder for the frontend service to be developed later.
    image: node:18-alpine
    container_name: chatbot_frontend
    ports:
      - "3000:3000"
    command: sh -c "echo 'Frontend is coming soon' && sleep infinity"

volumes:
  postgres_data:
  ollama_data:
